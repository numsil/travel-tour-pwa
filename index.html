<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a56db" />
  <title>투어 예약</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <img src="logo2.svg" alt="로고" class="logo" />
  </header>

  <main>
    <section class="tour-group">
      <h2>🏔️ 중부투어</h2>
      <div class="card-grid">
        <a class="card" href="https://ovjintour.co.kr/%EC%A4%91%EB%B6%80-3%EB%B0%95-4%EC%9D%BC/" target="_blank" rel="noopener">
          <img class="card-thumb" src="gobi.png" alt="중부투어" />
          <div class="card-info">
            <h3>중부투어 3박 4일</h3>
            <p>상품 정보 확인하기</p>
          </div>
          <span class="arrow">→</span>
        </a>
      </div>
    </section>

    <section class="tour-group">
      <h2>🏜️ 고비투어</h2>
      <div class="card-grid">
        <a class="card" href="#" target="_blank" rel="noopener">
          <img class="card-thumb" src="gobi.png" alt="고비투어" />
          <div class="card-info">
            <h3>고비투어 5박 6일</h3>
            <p>상품 정보 확인하기</p>
          </div>
          <span class="arrow">→</span>
        </a>
      </div>
    </section>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
