<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a56db" />
  <title>투어 예약</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <img src="logo2.svg" alt="로고" class="logo" />
  </header>

  <main>
    <section class="tour-group">
      <h2>🏔️ 중부투어</h2>
      <div class="card-grid">
        <a class="card" href="https://ovjintour.co.kr/%EC%A4%91%EB%B6%80-3%EB%B0%95-4%EC%9D%BC/" target="_blank" rel="noopener">
          <img class="card-thumb" src="gobi.png" alt="중부투어" />
          <div class="card-info">
            <h3>중부투어 3박 4일</h3>
            <p>상품 정보 확인하기</p>
          </div>
          <span class="arrow">→</span>
        </a>
      </div>
    </section>

    <section class="tour-group">
      <h2>🏜️ 고비투어</h2>
      <div class="card-grid">
        <a class="card" href="https://ovjintour.co.kr/%ea%b3%a0%eb%b9%84-5%eb%b0%95-6%ec%9d%bc/" target="_blank" rel="noopener">
          <img class="card-thumb" src="gobi.png" alt="고비투어" />
          <div class="card-info">
            <h3>고비투어 5박 6일</h3>
            <p>상품 정보 확인하기</p>
          </div>
          <span class="arrow">→</span>
        </a>
      </div>
    </section>
  </main>

  <footer>
    <button class="install-btn" id="installBtn">📲 홈 화면에 앱 추가하기</button>
    <p class="install-hint" id="installHint"></p>
  </footer>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    const installBtn = document.getElementById('installBtn');
    const installHint = document.getElementById('installHint');
    const ua = navigator.userAgent;

    const isKakao = ua.includes('KAKAOTALK');
    const isInAppBrowser = isKakao || ua.includes('NAVER') || ua.includes('Instagram') || ua.includes('FB_IAB');
    const isIOS = /iPhone|iPad|iPod/.test(ua);
    const isInStandaloneMode = window.navigator.standalone === true;

    // 이미 설치된 경우 버튼 숨김
    if (isInStandaloneMode) {
      installBtn.style.display = 'none';
    }
    // 카카오 등 인앱 브라우저
    else if (isInAppBrowser) {
      installBtn.textContent = '📲 Safari에서 열기';
      installBtn.addEventListener('click', () => {
        const safariUrl = 'safari-https://' + location.host + location.pathname;
        location.href = safariUrl;
      });
    }
    // iOS Safari
    else if (isIOS) {
      installBtn.addEventListener('click', () => {
        installHint.innerHTML = 'Safari 하단 공유 버튼(□↑) →<br><b>"홈 화면에 추가"</b> 를 눌러주세요';
        installHint.style.display = 'block';
      });
    }
    // Android Chrome
    else {
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
      });
      installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          deferredPrompt = null;
          if (outcome === 'accepted') installBtn.style.display = 'none';
        }
      });
      window.addEventListener('appinstalled', () => {
        installBtn.style.display = 'none';
      });
    }
  </script>
</body>
</html>
